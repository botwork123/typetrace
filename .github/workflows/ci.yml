name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: curl -LsSf https://astral.sh/uv/0.7.9/install.sh | sh
      - run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - run: ./scripts/wt_bootstrap.sh
      - run: ./scripts/wt_run.sh ruff check .
      - run: ./scripts/wt_run.sh ruff format --check .
      - run: ./scripts/wt_run.sh mypy src/typetrace
      - run: ./scripts/wt_run.sh pytest --cov=src/typetrace --cov-report=term-missing --cov-fail-under=85 tests/
