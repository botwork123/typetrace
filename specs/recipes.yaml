      scipy: null

  - id: selection_concat_flow_xarray
    category: matrix_ops
    summary: Select a subset of assets then concat along new scenario dim (xarray).
    inputs:
      - name: returns
        shape: [time, asset]
        dtype: float64
    preconditions:
      - "asset >= 2"
    dag:
      - op: select_col
        inputs: [returns, 0]
        output: base
      - op: select_col
        inputs: [returns, 1]
        output: alt
      - op: restack
        inputs: [base, alt]
        output: stacked
    expected_outputs:
      - name: stacked
        shape: [scenario, time]
        dtype: float64
    invariants:
      - "shape(stacked) == [2, time]"
    oracle:
      numpy: "np.stack([returns[:, 0], returns[:, 1]], axis=0)"
      scipy: null

  - id: selection_concat_flow_pandas_multiindex
    category: matrix_ops
    summary: Select subset by asset then concat into scenario-level MultiIndex frame.
    inputs:
      - name: panel
        shape: [time, asset]
        dtype: float64
    preconditions:
      - "asset >= 2"
    dag:
      - op: select_col
        inputs: [panel, 0]
        output: base
      - op: select_col
        inputs: [panel, 1]
        output: alt
      - op: restack
        inputs: [base, alt]
        output: stacked
    expected_outputs:
      - name: stacked
        shape: [scenario, time]
        dtype: float64
    invariants:
      - "index_name(stacked) == scenario"
    oracle:
      numpy: "np.stack([panel[:, 0], panel[:, 1]], axis=0)"
      scipy: null
